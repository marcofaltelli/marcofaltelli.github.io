author_logo: photo.jpg
author: Marco Faltelli
author_bio: 
        - I am a PhD student in Computer Science at the <a href="https://en.uniroma2.it/">University of Rome Tor Vergata</a>. My work is under the supervision of <a href="http://netgroup.uniroma2.it/people/faculties/giuseppebianchi/">Prof. Giuseppe Bianchi</a> and <a href="https://francescoquaglia.github.io/">Prof. Francesco Quaglia</a>. My research activities combine computer networking and computer architecture to design programmable state machine based architectures and primitives for both network hardware and software solutions. In October 2019 I received my Master's Degree in Computer Engineering cum laude at the University of Rome Tor Vergata.
        - From 2017 to 2019 I worked as a Student Researcher for <a href="https://www.cnit.it/">CNIT</a>, partecipating to the <a href="https://www.5g-picture-project.eu/">5G-PICTURE EU project</a>.
        - I further collaborate with <a href="https://axbryd.com/">Axbryd</a>, a startup company founded from the <a href="http://netprog.uniroma2.it/">NetProg</a> group of the University of Rome "Tor Vergata".
author_email: "marco.faltelli@uniroma2.it"
author_location: Rome, Italy

author_research_interests:
            - topic: Fast Packet Processing, High Performance Computing, Hardware-Software Co-design, Data Center Networks, SmartNIC/FPGA offloading
            - topic: In-Network Computing, Data Stream Processing, Distributed and In-Network Machine Learning

